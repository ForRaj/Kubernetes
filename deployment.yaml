apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure
  template:
    metadata:
      labels:
        app: insecure
    spec:
      hostNetwork: true  
      containers:
      - name: nginx
        image: nginx:latest
        securityContext:
          privileged: true
          allowPrivilegeEscalation: true   
          runAsUser: 0                     
          capabilities:
            add:
              - ALL                        
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: SECRET_KEY
          value: "hardcoded-secret"     
        volumeMounts:
        - mountPath: /host
          name: host-volume             
      volumes:
      - name: host-volume
        hostPath:
          path: /                        